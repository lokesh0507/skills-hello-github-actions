name: Post welcome comment

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:                          # ✅ Job name
    name: Post welcome comment      # ✅ Display name at job level
    runs-on: ubuntu-latest          # ✅ runs-on at job level

    steps:                          # ✅ steps comes after runs-on
      - name: Post welcome comment  # ✅ step name inside steps
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 Welcome! Thanks for opening a Pull Request!'
            })
